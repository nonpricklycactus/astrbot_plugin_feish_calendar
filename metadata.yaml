name: astrbot_plugin_feish_calendar
display_name: AstrBot 飞书日程管理
desc: 这是一个为 AstrBot 设计的飞书日历插件，支持自动创建、删除和管理飞书日历中的日程
version: 1.0.5
author: nonpricklycactus
repo: https://github.com/nonpricklycactus/astrbot_plugin_feish_calendar
config:
  app_id:
    type: string
    description: 飞书应用 App ID
    default: ""
  app_secret:
    type: password
    description: 飞书应用 App Secret
    default: ""
  calendar_id:
    type: string
    description: 专属日历的 Calendar ID (feishu.cn_ 开头)
    default: ""